<!doctype html>
<html lang="pt-BR">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Ephemeral">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/png" sizes="512x512" href="./nova-rede.png">
  <link rel="apple-touch-icon" href="./nova-rede.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>Chat Privado - Mensageiro Secreto Elegante</title><!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script><!-- Lucide Icons -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ==================== VARIÁVEIS CSS ==================== */
        :root {
            --primary-black: #0a0a0a;
            --dark-gray: #1a1a1a;
            --medium-gray: #2d2d2d;
            --light-gray: #4a4a4a;
            --soft-gray: #6a6a6a;
            --text-white: #f5f5f5;
            --text-light: #d4d4d4;
            --accent-white: #ffffff;
            --accent-gray: #888888;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --shadow-sm: 0 4px 15px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 15px 50px rgba(0, 0, 0, 0.5);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--primary-black);
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(135deg, var(--primary-black) 0%, #0f0f0f 50%, var(--dark-gray) 100%);
            color: var(--text-white);
            overflow: hidden;
            position: fixed;
            inset: 0;
        }

        /* ==================== TELA DE LOGIN ==================== */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-black) 0%, #0f0f0f 50%, var(--dark-gray) 100%);
        }

        .login-card {
            backdrop-filter: blur(20px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 60px 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            animation: slideInUp 0.6s ease-out;
        }

        .login-title {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--text-white), var(--text-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            text-align: center;
            color: var(--soft-gray);
            font-size: 13px;
            margin-bottom: 40px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            position: relative;
        }

        .form-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--soft-gray);
            margin-bottom: 8px;
            display: block;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-white);
            font-size: 15px;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-white);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }

        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-white), #e8e8e8);
            border: none;
            border-radius: 12px;
            color: var(--primary-black);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.2);
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(255, 255, 255, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ==================== CHAT PRINCIPAL ==================== */
        .chat-container {
            display: flex;
            width: 100%;
            height: 100%;
            background: var(--primary-black);
            max-width: 100vw;
            overflow: hidden;
        }

        .mobile-topbar {
            display: none;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 320px;
            background: var(--dark-gray);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            animation: slideInLeft 0.6s ease-out;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .user-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .user-details {
            flex: 1;
        }

        .username-display {
            font-weight: 700;
            font-size: 14px;
            color: var(--text-white);
        }

        .user-id {
            font-size: 11px;
            color: var(--soft-gray);
            margin-top: 4px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .logout-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .logout-btn:hover {
            background: rgba(255, 59, 48, 0.15);
            color: #ff3b30;
            border-color: rgba(255, 59, 48, 0.3);
        }

        /* --- SEARCH --- */
        .search-container {
            padding: 15px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-white);
            font-size: 14px;
            transition: var(--transition);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-white);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
        }

        /* --- CONVERSAS --- */
        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .conversation-item {
            padding: 15px 15px;
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .conversation-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-left-color: var(--accent-white);
        }

        .conversation-item.active {
            background: rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent-white);
        }

        .conversation-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-white);
        }

        .conversation-id {
            font-size: 11px;
            color: var(--soft-gray);
            margin-top: 4px;
            font-family: 'Courier New', monospace;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            text-align: center;
        }

        .empty-state-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        .empty-state-text {
            font-size: 13px;
            color: var(--soft-gray);
            line-height: 1.6;
        }

        /* --- MAIN CHAT AREA --- */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--primary-black);
            min-width: 0;
            max-width: 100vw;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideInDown 0.6s ease-out;
            max-width: 100%;
        }

        .chat-header-main {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-button {
            display: none;
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-light);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--accent-white);
            border-color: var(--accent-white);
        }

        .chat-header-info h2 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-white);
        }

        .chat-header-info p {
            font-size: 12px;
            color: var(--soft-gray);
            margin-top: 4px;
            font-family: 'Courier New', monospace;
        }

        /* --- MENSAGENS --- */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 0;
        }

        .message-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: fadeIn 0.4s ease-out;
        }

        .message-group.sent {
            align-items: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: slideInUp 0.3s ease-out;
            -webkit-touch-callout: none;
            user-select: text;
        }

        .message-bubble.received {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--text-light);
            border-radius: 16px 16px 16px 4px;
        }

        .message-bubble.sent {
            background: linear-gradient(135deg, var(--accent-white), #e8e8e8);
            color: var(--primary-black);
            border-radius: 16px 16px 4px 16px;
            font-weight: 500;
        }

        .message-timestamp {
            font-size: 11px;
            color: var(--soft-gray);
            margin-top: 4px;
        }

        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .message-image:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .message-file {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 12px;
            border-radius: 10px;
            margin-top: 8px;
        }

        .file-icon {
            width: 24px;
            height: 24px;
        }

        .file-name {
            font-size: 12px;
            font-weight: 500;
            word-break: break-word;
            flex: 1;
        }

        /* --- INPUT ÁREA --- */
        .input-area {
            padding: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
            align-items: center;
            animation: slideInUp 0.6s ease-out;
            background: rgba(15, 15, 15, 0.92);
            backdrop-filter: blur(18px);
            width: 100%;
            max-width: 100%;
            position: relative;
        }

        .input-group {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: center;
            min-width: 0;
            max-width: 100%;
        }

        .composer-tools {
            position: relative;
            flex-shrink: 0;
        }

        .attachment-menu {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 0;
            display: none;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
            border-radius: 16px;
            background: rgba(20, 20, 20, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
            z-index: 30;
        }

        .attachment-menu.active {
            display: flex;
        }

        .attachment-option {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 160px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: var(--text-white);
            padding: 11px 12px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }

        .attachment-option:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.14);
        }

        .attachment-option i {
            width: 16px;
            height: 16px;
        }

        .message-input {
            flex: 1;
            width: 100%;
            min-width: 0;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-white);
            font-size: 14px;
            resize: none;
            max-height: 100px;
            transition: var(--transition);
            font-family: inherit;
        }

        .message-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .message-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-white);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
        }

        .icon-button {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .icon-button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-white);
            color: var(--accent-white);
        }

        .send-button {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-white), #e8e8e8);
            border: none;
            border-radius: 10px;
            color: var(--primary-black);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
            font-weight: 700;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.3);
        }

        .send-button:active {
            transform: translateY(0);
        }

        /* ==================== MODAL ==================== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }

        .modal-overlay.active {
            display: flex;
        }

        #messageActionModal {
            align-items: flex-end;
        }

        .modal {
            background: var(--dark-gray);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            animation: slideInUp 0.4s ease-out;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-white);
        }

        .modal-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-white);
            font-size: 14px;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .modal-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-white);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
        }

        .modal-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent-white), #e8e8e8);
            border: none;
            border-radius: 10px;
            color: var(--primary-black);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.3);
        }

        .action-sheet {
            background: linear-gradient(180deg, rgba(31, 31, 31, 0.98), rgba(18, 18, 18, 0.98));
            border: 1px solid var(--glass-border);
            border-radius: 22px 22px 0 0;
            width: 100%;
            max-width: 520px;
            padding: 18px 18px calc(env(safe-area-inset-bottom, 0px) + 18px);
            box-shadow: 0 -15px 40px rgba(0, 0, 0, 0.45);
            animation: slideInUp 0.25s ease-out;
        }

        .action-sheet-title {
            font-size: 13px;
            color: var(--soft-gray);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 14px;
        }

        .action-sheet-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-sheet-button {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-white);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
        }

        .action-sheet-button:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .action-sheet-button.danger {
            color: #ff8c82;
            border-color: rgba(255, 59, 48, 0.2);
            background: rgba(255, 59, 48, 0.08);
        }

        .action-sheet-button i {
            width: 18px;
            height: 18px;
        }

        /* ==================== TOAST ==================== */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--dark-gray);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 14px;
            box-shadow: var(--shadow-md);
            animation: slideInRight 0.4s ease-out;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
        }

        .toast.success {
            border-left: 4px solid #34c759;
            background: rgba(52, 199, 89, 0.1);
        }

        .toast.error {
            border-left: 4px solid #ff3b30;
            background: rgba(255, 59, 48, 0.1);
        }

        .toast.info {
            border-left: 4px solid var(--accent-white);
            background: rgba(255, 255, 255, 0.08);
        }

        .toast.success .toast-icon { color: #34c759; }
        .toast.error .toast-icon { color: #ff3b30; }
        .toast.info .toast-icon { color: var(--accent-white); }

        .toast-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .toast-message {
            flex: 1;
            color: var(--text-white);
        }

        /* ==================== LOADING ==================== */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--accent-white);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-center {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
        }

        /* ==================== ANIMAÇÕES ==================== */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOutRight {
            from {

  <script>

        const publicVapidKey = "BJm-ECPol61g284B5IVfi-X6C9ZkIYYkIDg9Myh-sHv4TrYvg3zujF8Z3DxIcMirZ7NWGgRM4Y2Jhx/wQI_VMEU";

        // ==================== FUNÇÕES UTILITÁRIAS ====================
        
        /**
         * Gera um ID numérico único de 5 dígitos
         */
        function generateUserID() {
            return Math.floor(10000 + Math.random() * 90000).toString();
        }

        function getConversationKey(userA, userB) {
            return [userA, userB].sort().join('_');
        }

        async function generateUniqueUserID() {
            let userID = generateUserID();
            let existingUser = await db.collection('users').where('userID', '==', userID).get();

            while (!existingUser.empty) {
                userID = generateUserID();
                existingUser = await db.collection('users').where('userID', '==', userID).get();
            }

            return userID;
        }

        /**
         * Criptografia simples para as mensagens (AES básico via WebCrypto)
         * Em produção, use uma biblioteca de criptografia robusta
         */
        async function encryptMessage(message, key) {
            const encoder = new TextEncoder();
            const data = encoder.encode(message);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt(
                { name: "AES-GCM", iv },
                key,
                data
            );
            return {
                encryptedText: btoa(String.fromCharCode(...new Uint8Array(encrypted))),
                iv: btoa(String.fromCharCode(...iv))
            };
        }

        /**
         * Descriptografa mensagens
         */
        async function decryptMessage(encryptedMessage, key, ivBase64) {
            try {
                const binaryString = atob(encryptedMessage);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                const ivString = ivBase64 ? atob(ivBase64) : '';
                const iv = ivBase64
                    ? Uint8Array.from(ivString, char => char.charCodeAt(0))
                    : new Uint8Array(12);
                const decrypted = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv },
                    key,
                    bytes
                );
                return new TextDecoder().decode(decrypted);
            } catch (err) {
                console.error("Erro ao descriptografar:", err);
                return "[Mensagem criptografada]";
            }
        }

        /**
         * Cria uma chave de criptografia baseada no usuário
         */
        async function generateEncryptionKey(seed) {
            const encoder = new TextEncoder();
            const data = encoder.encode(seed + "_cipher_secret");
            const hashBuffer = await crypto.subtle.digest("SHA-256", data);
            return crypto.subtle.importKey(
                "raw",
                hashBuffer,
                { name: "AES-GCM" },
                false,
                ["encrypt", "decrypt"]
            );
        }

        /**
         * Mostra toast notifications
         */
        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            let icon = 'info';
            if (type === 'success') icon = 'check-circle';
            if (type === 'error') icon = 'alert-circle';

            toast.innerHTML = `
                <i data-lucide="${icon}" class="toast-icon"></i>
                <div class="toast-message">${message}</div>
            `;
            toastContainer.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.animation = 'slideOutRight 0.4s ease-out';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        /**
         * Formata timestamp para exibição
         */
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);

            if (minutes < 1) return 'Agora';
            if (minutes < 60) return `${minutes}m`;
            
            const hours = Math.floor(diff / 3600000);
            if (hours < 24) return `${hours}h`;
            
            return date.toLocaleDateString('pt-BR');
        }

        /**
         * Verifica se mensagem expirou (24 horas)
         */
        function isMessageExpired(timestamp) {
            const messageDate = new Date(timestamp);
            const now = new Date();
            const ageInHours = (now - messageDate) / (1000 * 60 * 60);
            return ageInHours > 24;
        }

        function resetChatUI() {
            currentChatUser = null;
            currentChatUserID = null;
            currentConversationID = null;
            currentConversationKey = null;
            notifiedMessageIds = new Set();

            if (messageUnsubscribe) {
                messageUnsubscribe();
                messageUnsubscribe = null;
            }

            document.getElementById('chatHeader').style.display = 'none';
            document.getElementById('messagesContainer').style.display = 'none';
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('messagesContainer').innerHTML = '';
            document.getElementById('noChatSelected').style.display = 'block';
            document.querySelectorAll('.conversation-item').forEach(item => {
                item.classList.remove('active');
            });
            handleViewportLayout();
        }

        async function getConversationByUsers(otherUserID) {
            const conversationKey = getConversationKey(currentUserID, otherUserID);
            const conversationsRef = db.collection('conversations');
            const convQuery = await conversationsRef
                .where('conversationKey', '==', conversationKey)
                .limit(1)
                .get();

            if (!convQuery.empty) {
                return {
                    conversationKey,
                    doc: convQuery.docs[0]
                };
            }

            const legacyQuery = await conversationsRef
                .where('participants', 'array-contains', currentUserID)
                .get();
            const legacyDoc = legacyQuery.docs.find(doc => {
                const participants = doc.data().participants || [];
                return participants.includes(otherUserID);
            });

            if (legacyDoc) {
                await legacyDoc.ref.update({ conversationKey });
            }

            return {
                conversationKey,
                doc: legacyDoc || null
            };
        }

        function isMobileView() {
            return window.innerWidth <= 768;
        }

        function openSidebar() {
            if (isMobileView()) {
                document.getElementById('sidebar').classList.add('mobile-open');

            document.getElementById('sidebarUserID').textContent = currentUserID || '00000';
            document.getElementById('mobileUsername').textContent = currentUser || 'Usuario';

        }

        function handleViewportLayout() {
            if (isMobileView()) {
                if (!currentConversationID) {
                    openSidebar();
                }
            } else {
                document.getElementById('sidebar').classList.remove('mobile-open');
            }

        function openMessageActionModal(messageContext) {
            selectedMessageContext = messageContext;
            document.getElementById('messageActionModal').classList.add('active');
        }

        function closeMessageActionModal() {
            selectedMessageContext = null;
            document.getElementById('messageActionModal').classList.remove('active');
        }

        function attachLongPressHandlers(element, messageContext) {
            let longPressTimer = null;
            let longPressTriggered = false;

            const startPress = (event) => {
                if (event.type === 'touchstart') {
                    longPressTriggered = false;
                }

                longPressTimer = window.setTimeout(() => {
                    longPressTriggered = true;
                    openMessageActionModal(messageContext);
                }, 550);
            };

            const clearPress = () => {
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                }
            };

            element.addEventListener('touchstart', startPress, { passive: true });
            element.addEventListener('touchend', clearPress);
            element.addEventListener('touchmove', clearPress);
            element.addEventListener('touchcancel', clearPress);
            element.addEventListener('mousedown', startPress);
            element.addEventListener('mouseup', clearPress);
            element.addEventListener('mouseleave', clearPress);
            element.addEventListener('contextmenu', (event) => {
                event.preventDefault();
                openMessageActionModal(messageContext);
            });
            element.addEventListener('click', (event) => {
                if (longPressTriggered) {
                    event.preventDefault();
                    event.stopPropagation();
                    longPressTriggered = false;
                }
            }, true);
        }

        async function copyTextToClipboard(text) {
            try {
                if (navigator.clipboard?.writeText) {
                    await navigator.clipboard.writeText(text);
                    return true;
                }
            } catch (error) {
                console.error('Erro ao copiar com clipboard API:', error);
            }

            const helper = document.createElement('textarea');
            helper.value = text;
            helper.style.position = 'fixed';
            helper.style.opacity = '0';
            document.body.appendChild(helper);
            helper.focus();
            helper.select();
            const copied = document.execCommand('copy');
            document.body.removeChild(helper);
            return copied;
        }

        async function saveMessageText(conversationID, messageID, text) {
            const conversationEncryptionKey = await generateEncryptionKey(currentConversationKey);
            const encryptedPayload = await encryptMessage(text, conversationEncryptionKey);

            await db.collection('conversations')
                .doc(conversationID)
                .collection('messages')
                .doc(messageID)
                .update({
                    text: encryptedPayload.encryptedText,
                    iv: encryptedPayload.iv,
                    edited: true
                });
        }

        async function sendTextToConversation(conversationID, conversationKey, recipientID, text) {
            const conversationEncryptionKey = await generateEncryptionKey(conversationKey);
            const encryptedPayload = await encryptMessage(text, conversationEncryptionKey);

            await db.collection('conversations')
                .doc(conversationID)
                .collection('messages')
                .add({
                    text: encryptedPayload.encryptedText,
                    iv: encryptedPayload.iv,
                    type: 'text',
                    encrypted: true,
                    sender: currentUserID,
                    recipient: recipientID,
                    timestamp: new Date(),
                    read: false,
                    edited: false
                });

            await db.collection('conversations').doc(conversationID).update({
                lastMessage: text,
                lastMessageTime: new Date()
            });
        }

        async function registerPushNotifications() {
            if (!messaging) {
                console.warn('Firebase Messaging nao suportado neste navegador.');
                return;
            }

            if (!('serviceWorker' in navigator) || !('Notification' in window)) {
                console.warn('Push nao suportado neste dispositivo.');
                return;
            }

            if (!publicVapidKey || publicVapidKey.includes('SUBSTITUA')) {
                console.warn('Defina a publicVapidKey antes de usar push.');
                return;
            }

            try {
                serviceWorkerRegistration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
                const permission = await Notification.requestPermission();

                if (permission !== 'granted') {
                    showToast('Notificacoes nao permitidas', 'info');
                    return;
                }

                const token = await messaging.getToken({
                    vapidKey: publicVapidKey,
                    serviceWorkerRegistration
                });

                if (!token) {
                    console.warn('Nenhum token FCM retornado.');
                    return;
                }

                pushToken = token;
                await savePushToken(token);
            } catch (error) {
                console.error('Erro ao registrar notificacoes push:', error);
                showToast('Nao foi possivel ativar notificacoes', 'error');
            }
        }

        async function savePushToken(token) {
            if (!currentUserID || !token) return;

            const usersRef = db.collection('users');
            const userQuery = await usersRef.where('userID', '==', currentUserID).limit(1).get();
            if (userQuery.empty) return;

            await userQuery.docs[0].ref.set({
                pushTokens: firebase.firestore.FieldValue.arrayUnion(token),
                notificationsEnabled: true,
                lastPushTokenUpdate: new Date()
            }, { merge: true });
        }

        async function removePushToken() {
            if (!currentUserID || !pushToken) return;

            try {
                const userQuery = await db.collection('users').where('userID', '==', currentUserID).limit(1).get();
                if (!userQuery.empty) {
                    await userQuery.docs[0].ref.set({
                        pushTokens: firebase.firestore.FieldValue.arrayRemove(pushToken),
                        lastPushTokenUpdate: new Date()
                    }, { merge: true });
                }
            } catch (error) {
                console.error('Erro ao remover token push:', error);
            }
        }

        function notifyForegroundMessage(title, body) {
            if (!('Notification' in window) || Notification.permission !== 'granted') return;

            const notification = new Notification(title, {
                body,
                icon: './nova-rede.png',
                tag: `ephemeral-${Date.now()}`
            });

            notification.onclick = () => window.focus();
        }

        function openAttachmentMenu() {
            document.getElementById('attachmentMenu').classList.add('active');
        }

        function closeAttachmentMenu() {
            document.getElementById('attachmentMenu').classList.remove('active');
        }

        function toggleAttachmentMenu() {
            document.getElementById('attachmentMenu').classList.toggle('active');
        }

        // ==================== AUTENTICAÇÃO ====================

        /**
         * Registra novo usuário ou faz login
         */
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            if (!username || !password) {
                showToast('Preencha todos os campos', 'error');
                return;
            }

            const loginButton = document.getElementById('loginButton');
            loginButton.disabled = true;
            loginButton.innerHTML = '<div class="loading-spinner"></div>';

            try {
                // Verifica se usuário existe no Firestore
                const usersRef = db.collection('users');
                const userQuery = await usersRef.where('username', '==', username).get();

                if (!userQuery.empty) {
                    // Usuário existe - verifica senha
                    const userData = userQuery.docs[0].data();
                    if (userData.password !== password) {
                        showToast('Senha incorreta', 'error');
                        return;
                    }
                    // Login bem-sucedido
                    currentUser = username;
                    currentUserID = userData.userID;
                } else {
                    // Novo usuário - cria conta
                    const newUserID = await generateUniqueUserID();
                    await usersRef.add({
                        username: username,
                        password: password, // ⚠️ Em produção, usar hash (bcrypt)
                        userID: newUserID,
                        createdAt: new Date(),
                        lastSeen: new Date()
                    });
                    currentUser = username;
                    currentUserID = newUserID;
                    showToast('Conta criada com sucesso!', 'success');
                }

                // Mostra tela de chat
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('chatScreen').style.display = 'flex';
                syncUserHeader();
                resetChatUI();
                await registerPushNotifications();

                // Carrega conversas
                loadConversations();
            } catch (error) {
                console.error('Erro no login:', error);
                showToast('Erro ao fazer login', 'error');
            } finally {
                loginButton.disabled = false;
                loginButton.textContent = 'ENTRAR';
            }
        });

        /**
         * Logout
         */
        function handleLogout() {
            if (confirm('Tem certeza que deseja sair?')) {
                removePushToken();
                currentUser = null;
                currentUserID = null;
                resetChatUI();
                
                document.getElementById('chatScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('usernameInput').value = '';
                document.getElementById('passwordInput').value = '';
                syncUserHeader();
                document.getElementById('conversationsList').innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="message-circle" class="empty-state-icon"></i>
                        <p class="empty-state-text">Nenhuma conversa iniciada ainda</p>
                    </div>
                `;
                showToast('Desconectado com sucesso', 'info');
            }
        }

        document.getElementById('logoutButton').addEventListener('click', handleLogout);
        document.getElementById('mobileLogoutButton').addEventListener('click', handleLogout);

        // ==================== BUSCA E CONVERSA ====================

        /**
         * Busca usuário por ID
         */
        document.getElementById('searchInput').addEventListener('input', async (e) => {
            const searchID = e.target.value.trim();

            if (!searchID) return;

            if (searchID.length !== 5 || !/^\d+$/.test(searchID)) {
                return;
            }

            try {
                const usersRef = db.collection('users');
                const userQuery = await usersRef.where('userID', '==', searchID).get();

                if (!userQuery.empty && userQuery.docs[0].data().userID !== currentUserID) {
                    const userData = userQuery.docs[0].data();
                    document.getElementById('foundUsername').textContent = userData.username;
                    document.getElementById('foundUserID').textContent = userData.userID;
                    document.getElementById('searchResultModal').classList.add('active');
                    currentChatUserID = userData.userID;
                    currentChatUser = userData.username;
                } else if (searchID === currentUserID) {
                    showToast('Você não pode conversar consigo mesmo', 'error');
                } else {
                    showToast('Usuário não encontrado', 'error');
                }
            } catch (error) {
                console.error('Erro ao buscar usuário:', error);
            }
        });

        /**
         * Inicia conversa com usuário encontrado
         */
        document.getElementById('startChatButton').addEventListener('click', () => {
            document.getElementById('searchResultModal').classList.remove('active');
            document.getElementById('searchInput').value = '';
            
            // Cria ou carrega conversa
            createOrLoadConversation(currentChatUserID, currentChatUser);
        });

        /**
         * Carrega todas as conversas do usuário
         */
        async function loadConversations() {
            try {
                const conversationsRef = db.collection('conversations');
                const userConversations = await conversationsRef
                    .where('participants', 'array-contains', currentUserID)
                    .get();
                const sortedConversations = userConversations.docs.sort((a, b) => {
                    const aTime = a.data().lastMessageTime?.toMillis?.() || 0;
                    const bTime = b.data().lastMessageTime?.toMillis?.() || 0;
                    return bTime - aTime;
                });

                const convList = document.getElementById('conversationsList');
                convList.innerHTML = '';

                if (userConversations.empty) {
                    convList.innerHTML = `
                        <div class="empty-state">
                            <i data-lucide="message-circle" class="empty-state-icon"></i>
                            <p class="empty-state-text">Nenhuma conversa iniciada ainda</p>
                        </div>
                    `;
                    return;
                }

                for (const doc of sortedConversations) {
                    const convData = doc.data();
                    const otherUserID = convData.participants.find(id => id !== currentUserID);
                    
                    // Busca info do outro usuário
                    const otherUserData = await db.collection('users')
                        .where('userID', '==', otherUserID)
                        .get();

                    if (!otherUserData.empty) {
                        const otherUser = otherUserData.docs[0].data();
                        const convItem = document.createElement('div');
                        convItem.className = 'conversation-item';
                        convItem.dataset.conversationId = doc.id;
                        convItem.innerHTML = `
                            <div class="conversation-name">${otherUser.username}</div>
                            <div class="conversation-id">ID: ${otherUserID}</div>
                        `;
                        convItem.addEventListener('click', () => {
                            selectConversation(doc.id, otherUserID, otherUser.username);
                        });
                        convList.appendChild(convItem);
                    }
                }
                lucide.createIcons();
            } catch (error) {
                console.error('Erro ao carregar conversas:', error);
            }
        }

        /**
         * Cria ou carrega conversa
         */
        async function createOrLoadConversation(otherUserID, otherUsername) {
            try {
                const conversationsRef = db.collection('conversations');
                const { conversationKey, doc: existingConversation } = await getConversationByUsers(otherUserID);

                let conversationID;
                if (existingConversation) {
                    conversationID = existingConversation.id;
                } else {
                    // Cria nova conversa
                    const newConv = await conversationsRef.add({
                        participants: [currentUserID, otherUserID],
                        conversationKey: conversationKey,
                        createdAt: new Date(),
                        lastMessage: null,
                        lastMessageTime: new Date()
                    });
                    conversationID = newConv.id;
                }

                selectConversation(conversationID, otherUserID, otherUsername);
                loadConversations();
                return conversationID;
            } catch (error) {
                console.error('Erro ao criar/carregar conversa:', error);
                showToast('Erro ao iniciar conversa', 'error');
                return null;
            }
        }

        /**
         * Seleciona uma conversa para exibir
         */
        function selectConversation(conversationID, otherUserID, otherUsername) {
            currentChatUserID = otherUserID;
            currentChatUser = otherUsername;
            currentConversationID = conversationID;
            currentConversationKey = getConversationKey(currentUserID, otherUserID);

            // Atualiza cabeçalho
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('chatHeaderName').textContent = otherUsername;
            document.getElementById('chatHeaderId').textContent = `ID: ${otherUserID}`;

            // Mostra área de mensagens e input
            document.getElementById('messagesContainer').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('noChatSelected').style.display = 'none';

            // Atualiza conversa ativa no sidebar
            document.querySelectorAll('.conversation-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.conversationId === conversationID) {
                    item.classList.add('active');
                }
            });

            // Carrega mensagens
            closeSidebar();
            loadMessages(conversationID, otherUserID);
        }

        /**
         * Carrega mensagens da conversa
         */
        function loadMessages(conversationID, otherUserID) {
            const messagesContainer = document.getElementById('messagesContainer');
            messagesContainer.innerHTML = '';
            const conversationKey = getConversationKey(currentUserID, otherUserID);

            // Desinscreve do anterior se existir
            if (messageUnsubscribe) messageUnsubscribe();

            // Inscreve em tempo real
            messageUnsubscribe = db.collection('conversations')
                .doc(conversationID)
                .collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot(async (snapshot) => {
                    messagesContainer.innerHTML = '';

                    for (const doc of snapshot.docs) {
                        const msg = doc.data();
                        const isOwnMessage = msg.sender === currentUserID;
                        const isFirstRenderForMessage = !notifiedMessageIds.has(doc.id);

                        // Verifica se mensagem expirou
                        if (isMessageExpired(msg.timestamp.toDate())) {
                            // Deleta mensagem expirada
                            await doc.ref.delete();
                            continue;
                        }

                        // Descriptografa mensagem se for texto
                        let displayText = msg.text;
                        if (msg.type === 'text' && msg.encrypted) {
                            const conversationEncryptionKey = await generateEncryptionKey(conversationKey);
                            displayText = await decryptMessage(msg.text, conversationEncryptionKey, msg.iv);
                        }

                        const msgGroup = document.createElement('div');
                        msgGroup.className = `message-group ${msg.sender === currentUserID ? 'sent' : ''}`;

                        const bubble = document.createElement('div');
                        bubble.className = `message-bubble ${msg.sender === currentUserID ? 'sent' : 'received'}`;

                        if (msg.type === 'text') {
                            bubble.textContent = displayText;
                            if (isOwnMessage) {
                                attachLongPressHandlers(bubble, {
                                    conversationID,
                                    messageID: doc.id,
                                    otherUserID,
                                    text: displayText
                                });
                            }
                        } else if (msg.type === 'image') {
                            const img = document.createElement('img');
                            img.src = msg.url;
                            img.className = 'message-image';
                            img.addEventListener('click', () => openImageModal(msg.url));
                            bubble.appendChild(img);
                        } else if (msg.type === 'file') {
                            const fileDiv = document.createElement('div');
                            fileDiv.className = 'message-file';
                            fileDiv.innerHTML = `
                                <i data-lucide="file" class="file-icon"></i>
                                <div class="file-name">${msg.fileName}</div>
                            `;
                            bubble.appendChild(fileDiv);
                            bubble.style.cursor = 'pointer';
                            bubble.addEventListener('click', () => {
                                const a = document.createElement('a');
                                a.href = msg.url;
                                a.download = msg.fileName;
                                a.click();
                            });
                        }

                        if (!isOwnMessage && isFirstRenderForMessage) {
                            const notificationBody = msg.type === 'text'
                                ? displayText
                                : (msg.type === 'image' ? 'Enviou uma imagem' : `Enviou ${msg.fileName || 'um arquivo'}`);

                            if (document.hidden || currentChatUserID !== otherUserID) {
                                notifyForegroundMessage(currentChatUser || 'Nova mensagem', notificationBody);
                            }
                        }

                        const timestamp = document.createElement('div');
                        timestamp.className = 'message-timestamp';
                        timestamp.textContent = `${formatTime(msg.timestamp.toDate())}${msg.edited ? ' • editada' : ''}`;

                        msgGroup.appendChild(bubble);
                        msgGroup.appendChild(timestamp);
                        messagesContainer.appendChild(msgGroup);
                        notifiedMessageIds.add(doc.id);
                        lucide.createIcons();
                    }

                    // Scroll para última mensagem
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                });
        }

        // ==================== ENVIO DE MENSAGENS ====================

        /**
         * Envia mensagem de texto
         */
        async function sendTextMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text || !currentChatUserID || !currentConversationID || !currentConversationKey) return;

            input.value = '';
            input.style.height = 'auto';

            try {
                await sendTextToConversation(
                    currentConversationID,
                    currentConversationKey,
                    currentChatUserID,
                    text
                );
                return;
                // Criptografa mensagem
                const conversationEncryptionKey = await generateEncryptionKey(currentConversationKey);
                const encryptedPayload = await encryptMessage(text, conversationEncryptionKey);

                // Envia mensagem
                await db.collection('conversations')
                    .doc(currentConversationID)
                        .collection('messages')
                        .add({
                        text: encryptedPayload.encryptedText,
                        iv: encryptedPayload.iv,
                        type: 'text',
                        encrypted: true,
                        sender: currentUserID,
                        timestamp: new Date(),
                        read: false
                    });

                // Atualiza última mensagem
                await db.collection('conversations').doc(currentConversationID).update({
                    lastMessage: text,
                    lastMessageTime: new Date()
                });
            } catch (error) {
                console.error('Erro ao enviar mensagem:', error);
                showToast('Erro ao enviar mensagem', 'error');
            }
        }

        /**
         * Envia arquivo
         */
        async function sendFile(file) {
            if (!currentChatUserID || !file || !currentConversationID) return;
            
            // Mostra loading
            showToast('Enviando arquivo...', 'info');

            try {
                const storageRef = storage.ref();
                const fileRef = storageRef.child(
                    `chats/${currentUserID}_${currentChatUserID}/${Date.now()}_${file.name}`
                );

                await fileRef.put(file);
                const downloadURL = await fileRef.getDownloadURL();

                // Determine tipo
                const isImage = file.type.startsWith('image/');
                const messageType = isImage ? 'image' : 'file';

                await db.collection('conversations')
                    .doc(currentConversationID)
                    .collection('messages')
                    .add({
                        url: downloadURL,
                        type: messageType,
                        sender: currentUserID,
                        recipient: currentChatUserID,
                        timestamp: new Date(),
                        fileName: file.name,
                        read: false
                    });

                await db.collection('conversations').doc(currentConversationID).update({
                    lastMessage: file.name,
                    lastMessageTime: new Date()
                });

                showToast('Arquivo enviado!', 'success');
            } catch (error) {
                console.error('Erro ao enviar arquivo:', error);
                showToast('Erro ao enviar arquivo', 'error');
            }
        }

        /**
         * Abre imagem em fullscreen
         */
        function openImageModal(url) {
            document.getElementById('modalImage').src = url;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // ==================== EVENT LISTENERS ====================

        // Enviar mensagem com Enter
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendTextMessage();
            }
        });

        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Botão enviar
        document.getElementById('sendButton').addEventListener('click', sendTextMessage);
        document.getElementById('plusButton').addEventListener('click', (e) => {
            e.stopPropagation();
            toggleAttachmentMenu();
        });

        // Anexar arquivo
        document.getElementById('attachButton').addEventListener('click', () => {
            closeAttachmentMenu();
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                sendFile(e.target.files[0]);
                e.target.value = '';
            }
        });

        // Galeria
        document.getElementById('galleryButton').addEventListener('click', () => {
            closeAttachmentMenu();
            document.getElementById('galleryInput').click();
        });

        document.getElementById('galleryInput').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                sendFile(e.target.files[0]);
                e.target.value = '';
            }
        });

        // Câmera
        document.getElementById('cameraButton').addEventListener('click', () => {
            closeAttachmentMenu();
            document.getElementById('cameraInput').click();
        });

        document.getElementById('cameraInput').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                sendFile(e.target.files[0]);
                e.target.value = '';
            }
        });

        // Fechar modal de imagem
        document.getElementById('imageModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('imageModal')) {
                closeImageModal();
            }
        });

        document.getElementById('messageActionModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('messageActionModal')) {
                closeMessageActionModal();
            }
        });

        document.getElementById('copyMessageButton').addEventListener('click', async () => {
            if (!selectedMessageContext) return;

            const copied = await copyTextToClipboard(selectedMessageContext.text);
            closeMessageActionModal();
            showToast(copied ? 'Mensagem copiada' : 'Nao foi possivel copiar', copied ? 'success' : 'error');
        });

        document.getElementById('deleteMessageButton').addEventListener('click', async () => {
            if (!selectedMessageContext) return;

            const { conversationID, messageID } = selectedMessageContext;
            closeMessageActionModal();

            if (!confirm('Apagar esta mensagem?')) return;

            try {
                await db.collection('conversations')
                    .doc(conversationID)
                    .collection('messages')
                    .doc(messageID)
                    .delete();
                showToast('Mensagem apagada', 'success');
            } catch (error) {
                console.error('Erro ao apagar mensagem:', error);
                showToast('Erro ao apagar mensagem', 'error');
            }
        });

        document.getElementById('editMessageButton').addEventListener('click', async () => {
            if (!selectedMessageContext) return;

            const { conversationID, messageID, text } = selectedMessageContext;
            closeMessageActionModal();
            const editedText = prompt('Editar mensagem:', text);

            if (editedText === null) return;

            const trimmedText = editedText.trim();
            if (!trimmedText) {
                showToast('A mensagem nao pode ficar vazia', 'error');
                return;
            }

            try {
                await saveMessageText(conversationID, messageID, trimmedText);
                showToast('Mensagem editada', 'success');
            } catch (error) {
                console.error('Erro ao editar mensagem:', error);
                showToast('Erro ao editar mensagem', 'error');
            }
        });

        document.getElementById('forwardMessageButton').addEventListener('click', async () => {
            if (!selectedMessageContext) return;

            const messageText = selectedMessageContext.text;
            closeMessageActionModal();
            const targetID = prompt('Encaminhar para qual ID?');

            if (targetID === null) return;

            const sanitizedID = targetID.trim();
            if (!/^\d{5}$/.test(sanitizedID)) {
                showToast('Digite um ID valido com 5 numeros', 'error');
                return;
            }

            if (sanitizedID === currentUserID) {
                showToast('Voce nao pode encaminhar para si mesmo', 'error');
                return;
            }

            try {
                const targetQuery = await db.collection('users')
                    .where('userID', '==', sanitizedID)
                    .limit(1)
                    .get();

                if (targetQuery.empty) {
                    showToast('Usuario nao encontrado', 'error');
                    return;
                }

                const targetUser = targetQuery.docs[0].data();
                const forwardedConversationID = await createOrLoadConversation(sanitizedID, targetUser.username);

                if (!forwardedConversationID) return;

                const forwardedConversationKey = getConversationKey(currentUserID, sanitizedID);
                await sendTextToConversation(
                    forwardedConversationID,
                    forwardedConversationKey,
                    sanitizedID,
                    messageText
                );

                showToast('Mensagem encaminhada', 'success');
            } catch (error) {
                console.error('Erro ao encaminhar mensagem:', error);
                showToast('Erro ao encaminhar mensagem', 'error');
            }
        });

        document.getElementById('backToSidebarButton').addEventListener('click', () => {
            resetChatUI();
        });

        document.addEventListener('click', (e) => {
            const tools = document.querySelector('.composer-tools');
            if (tools && !tools.contains(e.target)) {
                closeAttachmentMenu();
            }
        });

        window.addEventListener('resize', handleViewportLayout);
        handleViewportLayout();

        if (messaging) {
            messaging.onMessage((payload) => {
                const title = payload.notification?.title || 'Nova mensagem';
                const body = payload.notification?.body || 'Voce recebeu uma nova mensagem';
                notifyForegroundMessage(title, body);
            });
        }

        // Inicializa icons
        lucide.createIcons();
    </script>
